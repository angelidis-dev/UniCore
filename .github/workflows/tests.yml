name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Swift ${{ matrix.swift-version }}
    runs-on: macos-15
    strategy:
      matrix:
        swift-version: ['6.0']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ matrix.swift-version }}
      
      - name: Swift version
        run: swift --version
      
      - name: Resolve dependencies
        run: swift package resolve
      
      - name: Build
        run: swift build
      
      - name: Run tests
        run: swift test --verbose
      
      - name: Generate code coverage
        run: swift test --enable-code-coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: 6.0
      
      - name: Lint source code
        run: |
          swift package describe
          swift build
      
      - name: Check code formatting
        run: |
          if which swift-format > /dev/null; then
            swift-format --mode check Sources Tests
          else
            echo "swift-format not installed, skipping"
          fi

  security:
    name: Security Scan
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: 6.0
      
      - name: Check for vulnerabilities
        run: |
          echo "Checking package dependencies..."
          swift package describe
          
  documentation:
    name: Build Documentation
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: 6.0
      
      - name: Build documentation
        run: |
          swift build -Xswiftc -experimental-skip-non-inlinable-function-bodies-without-types
          echo "Documentation built successfully"
